<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Resources</title>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Figtree', system-ui, Arial, sans-serif;
  background:#f0f0f0;
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* cards */
.card{
  background:#fff;
  border-radius:15px;
  box-shadow:0 4px 8px rgba(0,0,0,.2);
  width:90%;
  max-width:900px;
  height:750px;
  padding:16px;
  display:none;
  flex-direction:column;
  justify-content:space-between;
}

.card.active{ display:flex; }

.card-content{
  flex-grow:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card img{
  max-width:100%;
  max-height:100%;
  border-radius:10px;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:10px;
}

/* nav */
.nav-buttons{
  display:flex;
  justify-content:space-between;
}

.nav-buttons button{
  padding:10px 18px;
  border:none;
  border-radius:25px;
  background:#007bff;
  color:#fff;
  cursor:pointer;
}

.nav-buttons button:hover{
  background:#0056b3;
}

.resources{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#ffffff;
  box-shadow:0 -2px 8px rgba(0,0,0,.15);
  padding:12px 16px;
}

.resources ul{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.resources li{
  margin:0;
}

.resources a{
  display:block;
  padding:8px 14px;
  border-radius:10px;
  background:#f1f5ff;
  color:#007bff;
  text-decoration:none;
  font-weight:600;
  font-size:0.95em;
  transition:all 0.2s ease;
  border:1px solid transparent;
}

.resources a:hover{
  background:#007bff;
  color:#fff;
  border-color:#007bff;
}
</style>
</head>

<body>

<!-- CARD 1 -->
<section class="card active">
  <div class="card-content">
    <img src="presentation_1.png">
  </div>
  <div class="nav-buttons">
    <button onclick="prevPage()">◀ Prev</button>
    <button onclick="nextPage()">Next ▶</button>
  </div>
</section>

<!-- CARD 2 -->
<section class="card">
  <div class="card-content">
    <img src="presentation_2.png">
  </div>
  <div class="nav-buttons">
    <button onclick="prevPage()">◀ Prev</button>
    <button onclick="nextPage()">Next ▶</button>
  </div>
</section>

<!-- CARD 3 -->
<section class="card">
  <div class="card-content">
    <img src="presentation_3.png"></iframe>
  </div>
  <div class="nav-buttons">
    <button onclick="prevPage()">◀ Prev</button>
    <button onclick="nextPage()">Next ▶</button>
  </div>
</section>

<!-- GLOBAL RESOURCE LINKS -->
<div class="resources">
  <ul>
    <li>
      <a href="MSB4_IN_Design thinking for robotics_Presentation.pptx">
        📥 Download presentation as PPTX
      </a>
    </li>

    <li>
      <a href="MSB4_OS_Design thinking for robotics_Client design spaces.pdf">
        📄 Client document: Space for Design
      </a>
    </li>

    <li>
      <a href="hubfix.html">
        🛠 Fix LEGO SPIKE → Mindstorms Inventor hub
      </a>
    </li>

    <li>
      <a href="Resource_Run_sheet.docx">
        🧾 Teacher run-sheet & instructions
      </a>
    </li>
  </ul>
</div>

<script>
let current = 0;
const cards = document.querySelectorAll('.card');

function updateNavButtons(){
  cards.forEach((card, index) => {
    const prevBtn = card.querySelector('.nav-buttons button:first-child');
    const nextBtn = card.querySelector('.nav-buttons button:last-child');

    // Prev button
    if(index === 0){
      prevBtn.style.visibility = (current === 0) ? 'hidden' : 'visible';
    } else {
      prevBtn.style.visibility = (index === current) ? 'visible' : prevBtn.style.visibility;
    }

    // Next button
    if(index === cards.length - 1){
      nextBtn.style.visibility = (current === cards.length - 1) ? 'hidden' : 'visible';
    } else {
      nextBtn.style.visibility = (index === current) ? 'visible' : nextBtn.style.visibility;
    }
  });
}

function show(i){
  cards[current].classList.remove('active');
  current = i;
  cards[current].classList.add('active');
  updateNavButtons();
}

function nextPage(){
  if(current < cards.length - 1) show(current + 1);
}

function prevPage(){
  if(current > 0) show(current - 1);
}

// initialize on load
updateNavButtons();
</script>
</body>
</html>
