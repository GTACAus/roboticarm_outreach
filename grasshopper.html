<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grasshopper — Biomimicry Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --ink: #111;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f4f4f4;
        font-family: Figtree, sans-serif;
        color: var(--ink);
      }
      .slide {
        max-width: 1200px;
        margin: 16px auto;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        padding: 28px;
        position: relative;
      }
      h1 {
        font-weight: 500;
        font-size: 2.4rem;
        margin: 6px 0 28px;
      }
      em {
        font-style: italic;
      }
      .text {
        font-size: 1.4rem;
        line-height: 1.5;
        margin: 0 0 20px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        align-items: end;
      }
      .img {
        width: 100%;
        height: auto;
        display: block;
      }
      .home {
        position: absolute;
        right: 16px;
        top: 16px;
        background: #f6c281;
        border: 2px solid #000;
        border-radius: 6px;
        padding: 8px 10px;
        text-decoration: none;
        color: #000;
        font-weight: 700;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
      }
      .btn {
        border: none;
        border-radius: 8px;
        padding: 12px 20px;
        font-size: 1rem;
        cursor: pointer;
      }
      .prev {background: #bdbdbd; color: #fff;   }
       .back { background: #FF6D3A; color: #fff; }
      .next {background: #16a34a; color: #fff;
      }
      .ref {
        font-size: 0.9rem;
        color: #555;
        font-style: italic;
        margin-top: 12px;
      }
      @media (max-width: 900px) {
        .text {
          font-size: 1.1rem;
        }
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <a class="home" href="biomimicry-library.html">🏠 Home</a>
    <main class="slide">
      <h1>Grasshopper - <em>Caelifera</em></h1>

      <p class="text">
        The grasshopper's hind legs store energy in a specialized tendon
        structure like a spring, allow them to release powerful bursts of force
        for high jumps.
      </p>

      <div class="row">
        <img
          class="img"
          src="https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcQ4RM1nw5xshZEGVgtoeCkG0NkCLs2OgHCiDB4EbXCwBkldobdmUd9g47pKZ_o7VHEnUQU8qca-1wWTqAcBa_jNEJLxqVEOGegj-0xkGlx6IQ"
          alt="grasshopper1"
        />
        <video id="ipadVideo" controls style="display: none">
          <source src="grasshopper.mp4" type="video/mp4" />
          <source src="grasshopper.mp4" type="video/quicktime" />
        </video>

        <!-- Default video -->
        <video id="defaultVideo" controls>
          <source src="grasshopper.mp4" type="video/mp4" />
          <source src="grasshopper.mp4" type="video/quicktime" />
        </video>
      </div>
      <p class="ref">
        Source: Grasshopper robot sets hopping record by New Scientist<br />
        <a href="https://www.youtube.com/watch?v=Pl99QQ8MXow" target="_blank">
          https://www.youtube.com/watch?v=Pl99QQ8MXow
        </a>
      </p>
      <div class="nav">
        <button class="btn prev" onclick="location.href='shrimp.html'">◀ Previous </button>
        <button class="btn back" onclick="location.href='biomimicry-library.html'">Back to Biomimicry Library</button>
        <button class="btn next" onclick="location.href='bat.html'"> Next ▶ </button>
      </div>
    </main>
  </body>
</html>
